<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoniFy - Status Pages</title>
  <link rel="stylesheet" href="/static/css/custom.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .status-page-card {
        background: rgba(8, 14, 30, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 12px;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
    }
    .sp-actions { display: flex; gap: 8px; }
    
    /* Simple Modal */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; overflow-y: auto;}
    .modal.active { display: flex; align-items: flex-start; padding: 40px 0; }
    .modal-content { background: #0f172a; border-radius: 16px; padding: 32px; width: 600px; border: 1px solid rgba(255,255,255,0.1); margin:auto; }

    .group-builder { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); padding: 16px; border-radius: 8px; margin-bottom: 12px; }
  </style>
</head>
<body>

<div class="app-shell">
  <div id="sidebar-container"></div>
  
  <div class="main-content">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 32px; padding: 24px;">
      <div>
        <h1 style="font-size:32px; font-weight:900; color:#fff;">Status Pages</h1>
        <p style="color:var(--text-dim);">Publish public system health dashboards.</p>
      </div>
      <button class="btn-primary" onclick="openCreateModal()">
          <i data-lucide="plus"></i> Create Status Page
      </button>
    </header>

    <div style="padding: 24px;">
        <div id="pages-list">
            <!-- Rendered by JS -->
            <p style="color: grey;">Loading...</p>
        </div>
    </div>
  </div>
</div>

<!-- Create Modal -->
<div class="modal" id="create-modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; margin-bottom: 24px;">
            <h2 style="color:#fff; font-size:20px; font-weight:bold;">New Status Page</h2>
            <i data-lucide="x" style="cursor:pointer; color:#888;" onclick="closeCreateModal()"></i>
        </div>

        <form id="create-sp-form">
            <div class="form-group">
                <label class="form-label">Page Name</label>
                <input type="text" class="form-input" id="sp-name" required placeholder="e.g. MoniFy Status">
            </div>
            <div class="form-group">
                <label class="form-label">Slug URL</label>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="color:grey; font-size:14px;">/status/</span>
                    <input type="text" class="form-input" id="sp-slug" required placeholder="monify">
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Custom Message (Optional)</label>
                <textarea class="form-input" id="sp-msg" rows="3" placeholder="Welcome to our status page..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Logo (Optional)</label>
                <input type="file" id="sp-logo" class="form-input" accept="image/*">
            </div>

            <div style="margin-top:24px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
                <h3 style="color:#fff; font-weight:bold;">Monitor Groups</h3>
                <button type="button" class="btn-primary" style="padding:6px 12px; font-size:12px;" onclick="addGroup()">+ Add Group</button>
            </div>

            <div id="groups-container"></div>

            <div style="margin-top: 32px; text-align:right;">
                <button type="button" class="btn-primary" onclick="submitStatusPage()">Publish Status Page</button>
            </div>
        </form>
    </div>
</div>

<script src="/static/js/app.js"></script>
<script>
lucide.createIcons();

const API_URL = window.location.origin;
const token = localStorage.getItem('token');
let availableMonitors = [];

async function init() {
    await fetchMonitors();
    await loadPages();
}

async function fetchMonitors() {
    try {
        const res = await fetch(`${API_URL}/api/reports/monitors`, { headers: { 'Authorization': `Bearer ${token}` } });
        if(res.ok) availableMonitors = await res.json();
    } catch(e) {}
}

async function loadPages() {
    const list = document.getElementById('pages-list');
    try {
        const res = await fetch(`${API_URL}/api/status-pages`, { headers: { 'Authorization': `Bearer ${token}` } });
        const pages = await res.json();
        if(pages.length === 0) {
            list.innerHTML = `<div style="text-align:center; color:grey; padding:40px;">No status pages yet.</div>`;
            return;
        }

        list.innerHTML = pages.map(p => `
            <div class="status-page-card">
                <div>
                    <h3 style="color:#fff; font-size:16px; font-weight:bold; margin-bottom:4px;">${p.name}</h3>
                    <a href="/status/${p.slug}" target="_blank" style="color:#3b82f6; font-size:12px; text-decoration:none;">/status/${p.slug}</a>
                </div>
                <div class="sp-actions">
                    <button class="btn-glass" onclick="deletePage(${p.id})"><i data-lucide="trash-2" style="width:16px; color:#ef4444;"></i></button>
                    <a href="/status/${p.slug}" target="_blank" class="btn-primary" style="text-decoration:none; padding:8px 16px;"><i data-lucide="external-link" style="width:16px;"></i> View</a>
                </div>
            </div>
        `).join('');
        lucide.createIcons();
    } catch(e) {
        list.innerText = "Error loading pages";
    }
}

async function deletePage(id) {
    if(!confirm('Delete this status page?')) return;
    try {
        await fetch(`${API_URL}/api/status-pages/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        loadPages();
    } catch(e) {}
}

function openCreateModal() {
    document.getElementById('groups-container').innerHTML = '';
    addGroup('Frontend');
    addGroup('Backend');
    document.getElementById('create-modal').classList.add('active');
}

function closeCreateModal() {
    document.getElementById('create-modal').classList.remove('active');
    document.getElementById('create-sp-form').reset();
}

let groupIndex = 0;
function addGroup(defaultName="") {
    groupIndex++;
    const container = document.getElementById('groups-container');
    const div = document.createElement('div');
    div.className = 'group-builder';
    div.id = `group-b-${groupIndex}`;
    
    let optionsHtml = availableMonitors.map(m => `
        <label style="display:flex; align-items:center; gap:8px; color:#ccc; font-size:13px; margin-bottom:6px;">
            <input type="checkbox" value="${m.id}" class="mon-sel-${groupIndex}"> ${m.name || m.url}
        </label>
    `).join('');

    if(availableMonitors.length === 0) optionsHtml = `<p style="color:grey; font-size:12px;">No monitors available.</p>`;

    div.innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
            <input type="text" class="form-input group-name-in" style="width:200px;" value="${defaultName}" placeholder="Group Name">
            <i data-lucide="trash" style="color:#ef4444; cursor:pointer;" onclick="document.getElementById('group-b-${groupIndex}').remove()"></i>
        </div>
        <div style="padding: 8px; background: rgba(0,0,0,0.3); border-radius: 6px;">
            ${optionsHtml}
        </div>
    `;
    container.appendChild(div);
    lucide.createIcons();
}

async function submitStatusPage() {
    const payload = {
        name: document.getElementById('sp-name').value,
        slug: document.getElementById('sp-slug').value,
        custom_message: document.getElementById('sp-msg').value,
        groups: []
    };

    if(!payload.name || !payload.slug) return alert("Name and Slug are required.");

    // Iterate and build groups
    const groupsElements = document.querySelectorAll('.group-builder');
    payload.groups = [];
    for(let g of groupsElements) {
        const gname = g.querySelector('.group-name-in').value;
        if(!gname) continue;
        const cbSel = g.querySelectorAll('input[type="checkbox"]:checked');
        const items = Array.from(cbSel).map(cb => ({ monitor_id: parseInt(cb.value) }));
        payload.groups.push({ name: gname, items });
    }

    try {
        const res = await fetch(`${API_URL}/api/status-pages`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        
        if(!res.ok) throw new Error(data.detail || "Error creating status page");

        // Handle File Upload if Logo exists
        const fileInput = document.getElementById('sp-logo');
        if (fileInput.files.length > 0) {
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            await fetch(`${API_URL}/api/status-pages/${data.id}/logo`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
        }

        closeCreateModal();
        loadPages();
    } catch(e) {
        alert(e.message);
    }
}

document.addEventListener('DOMContentLoaded', init);
setTimeout(() => {
    const link = document.querySelector('a[href="/status-pages"]');
    if(link) link.classList.add('active');
}, 500);

</script>
</body>
</html>
