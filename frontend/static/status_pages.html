<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status Pages - MoniFy-Ping</title>
  <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/custom.css">
  <link rel="stylesheet" href="/static/css/dashboard_premium.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] },
          colors: {
            bg: '#070b14', border: 'rgba(255,255,255,0.05)', primary: '#3b82f6'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg text-gray-300">

<div class="app-shell flex h-screen overflow-hidden">
  
  <!-- Sidebar Inject -->
  <div id="sidebar-container" class="flex-shrink-0"></div>

  <!-- Main Area -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
    
    <!-- Top Navbar -->
    <header class="top-header flex items-center justify-between z-10">
      <div class="flex items-center gap-4">
        <h1 class="header-title font-bold text-white text-2xl">Status Pages</h1>
        <span id="admin-badge" class="badge-admin py-1 px-3 rounded-full text-[10px] font-bold tracking-widest uppercase">SUPER ADMIN</span>
      </div>
      <div class="flex items-center gap-4">
        <button id="theme-toggle" class="theme-btn w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/10 transition-all border border-white/5" title="Toggle theme">
          <i id="theme-toggle-dark-icon" data-lucide="moon" class="w-4 h-4"></i>
          <i id="theme-toggle-light-icon" data-lucide="sun" class="w-4 h-4" style="color:#eab308;display:none;"></i>
        </button>
        <button onclick="openCreateModal()" class="btn-primary flex items-center gap-2 text-white px-6">
          <i data-lucide="plus" class="w-4 h-4"></i> Create New Page
        </button>
      </div>
    </header>

    <!-- Content Area Scrollable -->
    <div class="flex-1 overflow-y-auto p-8 relative">
      
      <!-- Ambient Lights -->
      <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-blue-600/5 blur-[120px] rounded-full -translate-y-1/2 translate-x-1/2 -z-10"></div>
      
      <div class="max-w-[1200px] mx-auto">
        <div class="space-y-8">
          
          <!-- Intro Section -->
          <div class="premium-panel p-8">
            <h2 class="text-xl font-bold text-white mb-2">Publish Public Dashboards</h2>
            <p class="text-gray-500 font-medium">Create beautiful status pages to keep your customers informed about system health.</p>
          </div>

          <!-- Pages List -->
          <div id="pages-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <!-- Rendered by JS -->
              <div class="col-span-full py-20 text-center">
                  <div class="animate-spin inline-block mb-4">
                      <i data-lucide="loader" class="text-primary w-8 h-8"></i>
                  </div>
                  <p class="text-gray-500">Retrieving status pages...</p>
              </div>
          </div>

        </div>
      </div>
    </div>

  </main>
</div>

<!-- Create Modal (Premium Style) -->
<div class="modal" id="create-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; align-items:flex-start; justify-content:center; padding:40px 0; overflow-y:auto; backdrop-filter:blur(10px);">
    <div class="premium-panel p-8 w-[600px] shadow-2xl animate-slide-up">
        <div class="flex justify-between items-center mb-8 pb-4 border-b border-white/5">
            <h2 class="text-xl font-bold text-white flex items-center gap-2">
                <i data-lucide="plus-circle" class="text-primary w-5 h-5"></i> New Status Page
            </h2>
            <button onclick="closeCreateModal()" class="w-8 h-8 bg-white/5 rounded-lg flex items-center justify-center hover:bg-white/10 transition-all text-gray-500 hover:text-white">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>

        <form id="create-sp-form" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Page Name</label>
                <input type="text" id="sp-name" required placeholder="e.g. MoniFy Status" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-white focus:border-primary outline-none transition-all placeholder:text-gray-700">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Slug URL</label>
                <div class="flex items-center bg-white/5 border border-white/5 rounded-xl px-4 py-3 group focus-within:border-primary transition-all">
                    <span class="text-gray-600 font-bold mr-2">/status/</span>
                    <input type="text" id="sp-slug" required placeholder="monify" class="flex-1 bg-transparent border-none text-white outline-none">
                </div>
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Announcement Message</label>
                <textarea id="sp-msg" rows="3" placeholder="All systems operational..." class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-white focus:border-primary outline-none transition-all placeholder:text-gray-700"></textarea>
            </div>

            <div class="flex items-center justify-between border-t border-white/5 pt-6 mt-6">
                <h3 class="text-sm font-bold text-white uppercase tracking-widest">Monitor Groups</h3>
                <button type="button" class="btn-glass text-xs py-2" onclick="addGroup()">+ Add Group</button>
            </div>

            <div id="groups-container" class="space-y-4"></div>

            <div class="pt-6 border-t border-white/5 flex justify-end">
                <button type="button" class="btn-primary" onclick="submitStatusPage()">Publish Status Page</button>
            </div>
        </form>
    </div>
</div>

<script src="/static/js/config.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/app.js?v=3"></script>
<script src="/static/js/toast.js"></script>
<script>
lucide.createIcons();

const API_URL = window.location.origin;
const token = localStorage.getItem('token');
let availableMonitors = [];

async function init() {
    await fetchMonitors();
    await loadPages();
}

async function fetchMonitors() {
    try {
        const res = await fetch(`${API_URL}/websites/`, { headers: { 'Authorization': `Bearer ${token}` } });
        if(res.ok) availableMonitors = await res.json();
    } catch(e) {}
}

async function loadPages() {
    const list = document.getElementById('pages-list');
    try {
        const res = await fetch(`${API_URL}/api/status-pages`, { headers: { 'Authorization': `Bearer ${token}` } });
        const pages = await res.json();
        if(pages.length === 0) {
            list.innerHTML = `
                <div class="col-span-full py-20 premium-panel flex flex-col items-center justify-center text-center">
                    <div class="w-20 h-20 bg-white/5 rounded-3xl flex items-center justify-center mb-6">
                        <i data-lucide="globe" class="text-gray-600 w-10 h-10"></i>
                    </div>
                    <h3 class="text-white font-bold text-lg mb-2">No Status Pages Ready</h3>
                    <p class="text-gray-500 max-w-xs mb-8">Share your system health with the world. Create your first page in seconds.</p>
                    <button class="btn-primary" onclick="openCreateModal()">Get Started</button>
                </div>`;
            lucide.createIcons();
            return;
        }

        list.innerHTML = pages.map(p => `
            <div class="premium-panel p-6 flex flex-col justify-between group hover:border-primary/20 transition-all">
                <div class="mb-6">
                    <div class="flex items-center justify-between mb-2">
                         <h3 class="text-white font-bold text-lg">${p.name}</h3>
                         <span class="text-[10px] font-bold text-green-500/80 bg-green-500/10 px-2 py-1 rounded-md uppercase tracking-wider">Public</span>
                    </div>
                    <a href="/status/${p.slug}" target="_blank" class="text-primary/70 hover:text-primary text-xs font-medium flex items-center truncate">
                       <i data-lucide="link" class="w-3 h-3 mr-2"></i> monify-ping.io/status/${p.slug}
                    </a>
                </div>
                <div class="flex items-center gap-3 pt-6 border-t border-white/5">
                    <button class="btn-glass !py-2 flex-1 flex items-center justify-center gap-2 hover:!bg-red-500/10 hover:!text-red-400" onclick="deletePage(${p.id})">
                        <i data-lucide="trash-2" class="w-4 h-4 text-red-400"></i> Delete
                    </button>
                    <a href="/status/${p.slug}" target="_blank" class="btn-primary !py-2 flex-1 flex items-center justify-center gap-2 text-white no-underline">
                        <i data-lucide="external-link" class="w-4 h-4"></i> View Page
                    </a>
                </div>
            </div>
        `).join('');
        lucide.createIcons();
    } catch(e) {
        list.innerHTML = `<div class="col-span-full text-center text-red-500 font-bold p-10">Failed to load content.</div>`;
    }
}

async function deletePage(id) {
    if(!confirm('Delete this status page?')) return;
    try {
        await fetch(`${API_URL}/api/status-pages/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        loadPages();
    } catch(e) {}
}

function openCreateModal() {
    document.getElementById('groups-container').innerHTML = '';
    addGroup('Frontend Services');
    addGroup('Backend Services');
    document.getElementById('create-modal').style.display = 'flex';
}

function closeCreateModal() {
    document.getElementById('create-modal').style.display = 'none';
    document.getElementById('create-sp-form').reset();
}

let groupIndex = 0;
function addGroup(defaultName="") {
    groupIndex++;
    const container = document.getElementById('groups-container');
    const div = document.createElement('div');
    div.className = 'p-5 bg-white/5 border border-white/5 rounded-2xl relative group';
    div.id = `group-b-${groupIndex}`;
    
    let optionsHtml = availableMonitors.map(m => `
        <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-white/5 transition-all cursor-pointer group">
            <input type="checkbox" value="${m.id}" class="mon-sel-${groupIndex} w-4 h-4 rounded border-white/10 bg-white/5 text-primary focus:ring-primary/20">
            <span class="text-sm text-gray-400 group-hover:text-white transition-colors">${m.name || m.url}</span>
        </label>
    `).join('');

    if(availableMonitors.length === 0) optionsHtml = `<p class="text-gray-600 text-xs italic">No monitors found in your account.</p>`;

    div.innerHTML = `
        <div class="flex justify-between items-center mb-4">
            <input type="text" class="bg-transparent border-none text-white font-bold text-sm outline-none w-full group-name-in" value="${defaultName}" placeholder="Group Name">
            <button type="button" onclick="document.getElementById('group-b-${groupIndex}').remove()" class="text-gray-600 hover:text-red-500 transition-colors">
                <i data-lucide="trash" class="w-4 h-4"></i>
            </button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
            ${optionsHtml}
        </div>
    `;
    container.appendChild(div);
    lucide.createIcons();
}

async function submitStatusPage() {
    const payload = {
        name: document.getElementById('sp-name').value,
        slug: document.getElementById('sp-slug').value,
        custom_message: document.getElementById('sp-msg').value,
        groups: []
    };

    if(!payload.name || !payload.slug) return alert("Name and Slug are required.");

    // Iterate and build groups
    const groupsElements = document.querySelectorAll('.group-builder, div[id^="group-b-"]');
    payload.groups = [];
    for(let g of groupsElements) {
        const nameInput = g.querySelector('.group-name-in');
        if(!nameInput) continue;
        const gname = nameInput.value;
        if(!gname) continue;
        const cbSel = g.querySelectorAll('input[type="checkbox"]:checked');
        const items = Array.from(cbSel).map(cb => ({ monitor_id: parseInt(cb.value) }));
        payload.groups.push({ name: gname, items });
    }

    try {
        const res = await fetch(`${API_URL}/api/status-pages`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        
        if(!res.ok) throw new Error(data.detail || "Error creating status page");

        // Handle File Upload if Logo exists
        const fileInput = document.getElementById('sp-logo');
        if (fileInput && fileInput.files.length > 0) {
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            await fetch(`${API_URL}/api/status-pages/${data.id}/logo`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
        }

        closeCreateModal();
        loadPages();
    } catch(e) {
        alert(e.message);
    }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
