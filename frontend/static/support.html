<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - MoniFy-Ping</title>
  <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/custom.css">
  <link rel="stylesheet" href="/static/css/dashboard_premium.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] },
          colors: {
            bg: '#070b14', border: 'rgba(255,255,255,0.05)', primary: '#3b82f6'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg text-gray-300">

<div class="app-shell flex h-screen overflow-hidden">
  
  <div id="sidebar-container" class="flex-shrink-0"></div>

  <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
    
    <header class="top-header flex items-center justify-between z-10 px-8">
      <h1 class="header-title font-bold text-white text-2xl">Help & Support</h1>
      <div class="flex items-center gap-4">
        <button id="theme-toggle" class="theme-btn w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 border border-white/5">
          <i id="theme-toggle-dark-icon" data-lucide="moon" class="w-4 h-4"></i>
          <i id="theme-toggle-light-icon" data-lucide="sun" class="w-4 h-4" style="color:#eab308;display:none;"></i>
        </button>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto p-8 relative flex items-center justify-center">
      <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-emerald-600/5 blur-[120px] rounded-full -translate-y-1/2 translate-x-1/2 -z-10"></div>
      
      <div class="max-w-[500px] w-full mx-auto">
        <div class="premium-panel p-10 text-center space-y-8 animate-slide-up">
            <div class="w-20 h-20 bg-primary/10 rounded-[32px] flex items-center justify-center mx-auto shadow-2xl shadow-primary/20 border border-primary/20">
                <i data-lucide="life-buoy" class="w-10 h-10 text-primary"></i>
            </div>
            
            <div class="space-y-3">
                <h2 class="text-2xl font-black text-white">Contact Systems Support</h2>
                <p class="text-sm text-gray-500 font-medium leading-relaxed">Facing issues with your monitors or infrastructure setup? Our team of engineers is available 24/7.</p>
            </div>

            <div class="grid grid-cols-1 gap-4 text-left">
                <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5">
                    <div class="w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-400">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <span class="block text-[10px] font-bold text-gray-600 uppercase tracking-widest leading-none mb-1">Email Terminal</span>
                        <span class="text-sm font-bold text-white">support@monify-ping.io</span>
                    </div>
                </div>
                <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5">
                    <div class="w-10 h-10 rounded-xl bg-green-500/10 flex items-center justify-center text-green-400">
                        <i data-lucide="zap" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <span class="block text-[10px] font-bold text-gray-600 uppercase tracking-widest leading-none mb-1">Response Latency</span>
                        <span class="text-sm font-bold text-white">&lt; 120 Minutes Avg.</span>
                    </div>
                </div>
            </div>

            <button id="notify-admin" class="btn-primary w-full py-4 text-white font-bold flex items-center justify-center gap-3">
                <i data-lucide="send" class="w-5 h-5"></i> Open Support Ticket
            </button>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="/static/js/config.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/app.js?v=3"></script>
<script src="/static/js/toast.js"></script>
<script>
  lucide.createIcons();

  document.addEventListener("DOMContentLoaded", () => {
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = '/login'; return; }

    const btn = document.getElementById('notify-admin');
    btn.addEventListener('click', () => {
      showToast("Support ticket initialized! Checking queue...");
      btn.innerText = "Ticket Dispatched";
      btn.disabled = true;
      btn.classList.add('opacity-50');
    });
  });
</script>
</body>
</html>
