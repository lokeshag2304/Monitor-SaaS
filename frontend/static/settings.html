<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - MoniFy-Ping</title>
  <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/custom.css">
  <link rel="stylesheet" href="/static/css/dashboard_premium.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] },
          colors: {
            bg: '#070b14', border: 'rgba(255,255,255,0.05)', primary: '#3b82f6'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg text-gray-300">

<div class="app-shell flex h-screen overflow-hidden">
  
  <div id="sidebar-container" class="flex-shrink-0"></div>

  <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
    
    <header class="top-header flex items-center justify-between z-10 px-8">
      <h1 class="header-title font-bold text-white text-2xl">Account Settings</h1>
      <div class="flex items-center gap-4">
        <button id="theme-toggle" class="theme-btn w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 border border-white/5">
          <i id="theme-toggle-dark-icon" data-lucide="moon" class="w-4 h-4"></i>
          <i id="theme-toggle-light-icon" data-lucide="sun" class="w-4 h-4" style="color:#eab308;display:none;"></i>
        </button>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto p-8 relative">
      <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-indigo-600/5 blur-[120px] rounded-full -translate-y-1/2 translate-x-1/2 -z-10"></div>
      
      <div class="max-w-[1000px] mx-auto">
        <div class="flex flex-col md:flex-row gap-8">
            
            <!-- Settings Nav -->
            <div class="w-full md:w-64 space-y-2">
                <button onclick="switchSection('profile')" id="nav-profile" class="nav-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl bg-white/5 border border-white/5 text-gray-400 font-bold text-sm transition-all hover:bg-white/10 active-nav bg-white/10">
                    <i data-lucide="user" class="w-4 h-4"></i> Profile Details
                </button>
                <button onclick="switchSection('users')" id="nav-users" class="nav-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl bg-white/5 border border-white/5 text-gray-400 font-bold text-sm transition-all hover:bg-white/10 hidden">
                    <i data-lucide="users" class="w-4 h-4"></i> User Directory
                </button>
                <button onclick="switchSection('system')" id="nav-system" class="nav-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl bg-white/5 border border-white/5 text-gray-400 font-bold text-sm transition-all hover:bg-white/10">
                    <i data-lucide="settings-2" class="w-4 h-4"></i> Display & Theme
                </button>
            </div>

            <!-- Settings Body -->
            <div class="flex-1">
                
                <!-- PROFILE SECTION -->
                <div id="section-profile" class="section-view space-y-8">
                    <div class="premium-panel p-8 space-y-10">
                        <div class="flex items-center gap-8">
                            <div class="relative">
                                <div id="preview-avatar" class="w-24 h-24 rounded-[32px] bg-primary/10 border-2 border-primary/20 flex items-center justify-center text-3xl font-black text-primary shadow-2xl shadow-primary/20">
                                    ?
                                </div>
                                <label class="absolute -bottom-2 -right-2 bg-[#0d1526] p-2 rounded-xl border border-white/10 cursor-pointer shadow-xl hover:scale-110 transition-transform">
                                    <i data-lucide="camera" class="w-4 h-4 text-primary"></i>
                                    <input type="file" id="image-upload" class="hidden" accept="image/*">
                                </label>
                            </div>
                            <div>
                                <h3 id="display-name" class="text-2xl font-black text-white mb-1">...</h3>
                                <p id="display-role" class="text-xs font-bold text-gray-500 uppercase tracking-widest">Access: --</p>
                            </div>
                        </div>

                        <form id="profile-form" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Account Display Name</label>
                                    <input type="text" id="input-name" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-white outline-none focus:border-primary transition-all">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Email (Read Only)</label>
                                    <input type="email" id="input-email" readonly class="w-full bg-white/[0.02] border border-white/5 rounded-xl px-4 py-3 text-gray-500 cursor-not-allowed">
                                </div>
                            </div>
                            
                            <div class="pt-10 border-t border-white/5">
                                <h4 class="text-xs font-black text-white uppercase tracking-widest mb-6 border-l-4 border-primary pl-4">Security Updates</h4>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="md:col-span-2">
                                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Verification Required: Current Password</label>
                                        <input type="password" id="input-current-pass" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-white outline-none focus:border-red-500/50 transition-all" placeholder="Enter password to save changes">
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">New Password (Optional)</label>
                                        <input type="password" id="input-new-pass" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-white outline-none focus:border-primary transition-all">
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Confirm New Password</label>
                                        <input type="password" id="input-confirm-pass" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-white outline-none focus:border-primary transition-all">
                                    </div>
                                </div>
                            </div>

                            <div class="pt-8 text-right">
                                <button type="submit" class="btn-primary px-10 text-white font-bold" id="btn-save-profile">Synchronize Changes</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- USERS SECTION -->
                <div id="section-users" class="section-view hidden space-y-8">
                     <div class="premium-panel overflow-hidden">
                        <div class="p-8 border-b border-white/5">
                            <h2 class="text-xl font-bold text-white mb-2">Team Directory</h2>
                            <p class="text-xs text-gray-500 font-medium">Manage administrative access to your infrastructure dashboard.</p>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-white/[0.02] text-[10px] font-bold text-gray-500 uppercase tracking-widest">
                                    <tr>
                                        <th class="px-8 py-4">Identity</th>
                                        <th class="px-8 py-4 text-center">Authorization</th>
                                        <th class="px-8 py-4 text-center">Status</th>
                                        <th class="px-8 py-4 text-right">Manage</th>
                                    </tr>
                                </thead>
                                <tbody id="user-list-body" class="divide-y divide-white/5">
                                    <!-- Injected -->
                                </tbody>
                            </table>
                        </div>
                     </div>
                </div>

                <!-- SYSTEM SECTION -->
                <div id="section-system" class="section-view hidden space-y-8">
                     <div class="premium-panel p-8 space-y-12">
                          <div>
                              <h3 class="text-sm font-bold text-white uppercase tracking-widest mb-8">Brand Color Accent</h3>
                              <div class="flex flex-wrap gap-4" id="accent-colors">
                                  <div class="w-10 h-10 rounded-full cursor-pointer ring-offset-bg ring-offset-2 hover:scale-110 shadow-lg transition-all" style="background:#3b82f6" data-color="#3b82f6" onclick="setAccent('#3b82f6', this)"></div>
                                  <div class="w-10 h-10 rounded-full cursor-pointer ring-offset-bg ring-offset-2 hover:scale-110 shadow-lg transition-all" style="background:#8b5cf6" data-color="#8b5cf6" onclick="setAccent('#8b5cf6', this)"></div>
                                  <div class="w-10 h-10 rounded-full cursor-pointer ring-offset-bg ring-offset-2 hover:scale-110 shadow-lg transition-all" style="background:#ec4899" data-color="#ec4899" onclick="setAccent('#ec4899', this)"></div>
                                  <div class="w-10 h-10 rounded-full cursor-pointer ring-offset-bg ring-offset-2 hover:scale-110 shadow-lg transition-all" style="background:#f59e0b" data-color="#f59e0b" onclick="setAccent('#f59e0b', this)"></div>
                                  <div class="w-10 h-10 rounded-full cursor-pointer ring-offset-bg ring-offset-2 hover:scale-110 shadow-lg transition-all" style="background:#10b981" data-color="#10b981" onclick="setAccent('#10b981', this)"></div>
                                  <div class="w-10 h-10 rounded-full cursor-pointer ring-offset-bg ring-offset-2 hover:scale-110 shadow-lg transition-all" style="background:#ef4444" data-color="#ef4444" onclick="setAccent('#ef4444', this)"></div>
                              </div>
                          </div>

                          <div class="grid grid-cols-1 md:grid-cols-2 gap-12 pt-8 border-t border-white/5">
                              <div>
                                  <h3 class="text-sm font-bold text-white uppercase tracking-widest mb-6">Regional Settings</h3>
                                  <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">System Timezone</label>
                                  <select id="pref-timezone" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-primary">
                                      <option value="UTC">Universal Standard Time</option>
                                      <option value="Asia/Kolkata">IST (UTC+5:30)</option>
                                      <option value="America/New_York">EST (UTC-5)</option>
                                      <option value="Europe/London">GMT/BST</option>
                                  </select>
                              </div>
                              <div>
                                  <h3 class="text-sm font-bold text-white uppercase tracking-widest mb-6">Interface Dynamics</h3>
                                  <div class="flex gap-4">
                                       <button class="flex-1 btn-glass text-xs font-bold" id="glass-normal" onclick="setGlass('normal', this)">Premium</button>
                                       <button class="flex-1 btn-glass text-xs font-bold" id="glass-subtle" onclick="setGlass('subtle', this)">Subtle</button>
                                       <button class="flex-1 btn-glass text-xs font-bold" id="glass-none" onclick="setGlass('none', this)">Plain</button>
                                  </div>
                              </div>
                          </div>

                          <div class="pt-8 border-t border-white/5 text-right">
                               <button class="btn-primary px-12 text-white font-bold" onclick="saveSystemPrefs()">Apply Changes Globally</button>
                          </div>
                     </div>
                </div>

            </div>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- Password Wizard Modal -->
<div id="password-wizard" class="modal px-4 items-center justify-center bg-black/80 backdrop-blur-md" style="display:none; position:fixed; inset:0; z-index:1000;">
    <div class="premium-panel p-8 w-full max-w-[450px] animate-slide-up">
        <div id="step-confirm" class="wizard-step active space-y-6">
            <div class="w-16 h-16 bg-red-500/10 text-red-500 rounded-3xl flex items-center justify-center mx-auto shadow-2xl shadow-red-500/20 border border-red-500/20">
                <i data-lucide="shield-alert" class="w-8 h-8"></i>
            </div>
            <div class="text-center">
                <h2 class="text-xl font-black text-white mb-2">Internal Override</h2>
                <p class="text-xs text-gray-500 font-medium leading-relaxed">Modify internal credentials for <br><span class="text-red-400 font-bold" id="wizard-user-email"></span></p>
            </div>
            <div class="flex gap-4 pt-4">
                <button class="flex-1 btn-glass" onclick="closeWizard()">Cancel</button>
                <button class="flex-1 btn-primary text-white font-bold" onclick="goToStep('update')">Reset Password</button>
            </div>
        </div>

        <div id="step-update" class="wizard-step hidden space-y-6">
            <h2 class="text-xl font-bold text-white">New Credential</h2>
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Temporary Password</label>
                <input type="text" id="wizard-new-pass" class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-white outline-none focus:border-primary">
            </div>
            <div class="flex gap-4">
                <button class="flex-1 btn-glass" onclick="closeWizard()">Cancel</button>
                <button class="flex-1 btn-primary text-white" onclick="saveNewPassword()">Update User</button>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/config.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/app.js?v=6"></script>
<script src="/static/js/toast.js"></script>
<script>
    const API_BASE = window.location.origin;
    let currentUser = null;
    let tempPrefs = { theme_mode: 'dark', theme_color: '#3b82f6', glass_effect: 'normal', timezone: 'UTC' };

    async function init() {
        const token = localStorage.getItem('token');
        if (!token) window.location.href = "/";
        
        try {
            const res = await fetch(`${API_BASE}/auth/me`, { 
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                currentUser = await res.json();
                fillProfileData();
                
                // Set Up Admins
                if (currentUser.role.toUpperCase() === 'ADMIN') {
                    document.getElementById('nav-users').classList.remove('hidden');
                }
                
                // Initialize Prefs
                tempPrefs = {
                    theme_mode: currentUser.theme_mode || 'dark',
                    theme_color: currentUser.theme_color || '#3b82f6',
                    glass_effect: currentUser.glass_effect || 'normal',
                    timezone: currentUser.timezone || 'UTC'
                };
                
                document.getElementById('pref-timezone').value = tempPrefs.timezone;
                applyUIPreview(tempPrefs);
            } else {
                window.location.href = "/";
            }
        } catch(e) { 
            console.error("Init Error:", e);
            if(window.showError) showError("Failed to sync profile settings.");
        }
        lucide.createIcons();
    }

    function fillProfileData() {
        document.getElementById('display-name').innerText = currentUser.name || currentUser.full_name || 'User';
        document.getElementById('display-role').innerText = `Access: ${currentUser.role}`;
        document.getElementById('input-name').value = currentUser.name || currentUser.full_name || '';
        document.getElementById('input-email').value = currentUser.email;
        
        const preview = document.getElementById('preview-avatar');
        if(currentUser.profile_image) {
            preview.innerHTML = `<img src="${currentUser.profile_image}" class="w-full h-full object-cover rounded-[32px]">`;
        } else {
            preview.innerText = (currentUser.name || currentUser.email)[0].toUpperCase();
        }
    }

    function applyUIPreview(prefs) {
        // Color
        document.documentElement.style.setProperty('--primary', prefs.theme_color);
        document.querySelectorAll('[onclick^="setAccent"]').forEach(el => {
            if(el.getAttribute('data-color') === prefs.theme_color) {
                el.classList.add('ring-2', 'ring-white');
            } else {
                el.classList.remove('ring-2', 'ring-white');
            }
        });
        
        // Glass
        document.querySelectorAll('#glass-normal, #glass-subtle, #glass-none').forEach(btn => {
            if(btn.id === `glass-${prefs.glass_effect}`) btn.classList.add('bg-primary/20', 'border-primary/50', 'text-white');
            else btn.classList.remove('bg-primary/20', 'border-primary/50', 'text-white');
        });
    }

    function switchSection(id) {
        document.querySelectorAll('.section-view').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav', 'bg-white/10'));
        
        document.getElementById(`section-${id}`).classList.remove('hidden');
        document.getElementById(`nav-${id}`).classList.add('active-nav', 'bg-white/10');
        
        if (id === 'users') fetchUsers();
        lucide.createIcons();
    }

    function setAccent(color, el) {
        tempPrefs.theme_color = color;
        applyUIPreview(tempPrefs);
    }
    
    function setGlass(level, el) {
        tempPrefs.glass_effect = level;
        applyUIPreview(tempPrefs);
    }

    async function fetchUsers() {
        const body = document.getElementById('user-list-body');
        try {
            const res = await fetch(`${API_BASE}/admin/users`, { 
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const users = await res.json();
            body.innerHTML = users.map(u => `
                <tr class="hover:bg-white/[0.01] group transition-colors">
                    <td class="px-8 py-5">
                       <div class="text-sm font-bold text-white">${u.name || 'No Name'}</div>
                       <div class="text-[10px] text-gray-600 font-bold uppercase tracking-tight">${u.email}</div>
                    </td>
                    <td class="px-8 py-5 text-center">
                       <span class="text-[9px] font-black text-primary bg-primary/10 px-3 py-1.5 rounded-md uppercase tracking-widest border border-primary/20">${u.role}</span>
                    </td>
                    <td class="px-8 py-5 text-center">
                       <span class="text-[9px] font-black ${u.is_active ? 'text-green-500 bg-green-500/10' : 'text-red-500 bg-red-500/10'} border border-white/5 px-3 py-1.5 rounded-md uppercase tracking-widest">${u.is_active ? 'Active' : 'Locked'}</span>
                    </td>
                    <td class="px-8 py-5 text-right">
                       <button class="btn-glass !py-1.5 text-[10px] font-bold" onclick="openWizard('${u.email}', '${u.id}')">Override</button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        } catch(e) {
            console.error("Fetch Users Error:", e);
        }
    }

    async function saveSystemPrefs() {
        tempPrefs.timezone = document.getElementById('pref-timezone').value;
        const formData = new FormData();
        Object.keys(tempPrefs).forEach(k => formData.append(k, tempPrefs[k]));
        
        try {
            const res = await fetch(`${API_BASE}/api/update-profile`, { 
                method: 'PUT', 
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }, 
                body: formData 
            });
            if(res.ok) {
                if(window.showSuccess) showSuccess("Display strategy synchronized!");
                // Force update sidebar and global appearance
                if(window.updateSidebarProfile) window.updateSidebarProfile({...currentUser, ...tempPrefs});
                if(window.applyUserPreferences) window.applyUserPreferences({...currentUser, ...tempPrefs});
            }
        } catch(e) {
             if(window.showError) showError("Failed to save system updates.");
        }
    }

    let wizardEmail = '';
    let wizardUserId = '';
    window.openWizard = (email, userId) => {
        wizardEmail = email;
        wizardUserId = userId;
        document.getElementById('wizard-user-email').innerText = email;
        document.getElementById('password-wizard').style.display = 'flex';
        goToStep('confirm');
    }
    window.closeWizard = () => document.getElementById('password-wizard').style.display = 'none';
    window.goToStep = (s) => {
        document.querySelectorAll('.wizard-step').forEach(step => step.classList.add('hidden'));
        document.getElementById(`step-${s}`).classList.remove('hidden');
    }
    
    window.saveNewPassword = async () => {
        const pass = document.getElementById('wizard-new-pass').value;
        if(!pass) return showWarning("Token cannot be empty.");
        try {
            const res = await fetch(`${API_BASE}/admin/users/${wizardUserId}/password`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                body: JSON.stringify({ new_password: pass })
            });
            if(res.ok) { 
                showSuccess("User access token reset!"); 
                closeWizard(); 
            } else {
                showError("Unauthorized override.");
            }
        } catch(e) {
            showError("System failure.");
        }
    }

    document.getElementById('profile-form').onsubmit = async (e) => {
        e.preventDefault();
        const curPass = document.getElementById('input-current-pass').value;
        if(!curPass) return showWarning("Current password required to sync identity.");
        
        const newPass = document.getElementById('input-new-pass').value;
        const confPass = document.getElementById('input-confirm-pass').value;
        
        if(newPass && newPass !== confPass) return showError("New credentials do not match.");

        const formData = new FormData();
        formData.append('name', document.getElementById('input-name').value);
        formData.append('current_password', curPass);
        if(newPass) formData.append('new_password', newPass);
        
        const avatarFile = document.getElementById('image-upload').files[0];
        if(avatarFile) formData.append('profileImage', avatarFile);
        
        try {
            const res = await fetch(`${API_BASE}/api/update-profile`, { 
                method: 'PUT', 
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }, 
                body: formData 
            });
            if(res.ok) {
                const data = await res.json();
                currentUser = data.profile;
                fillProfileData();
                showSuccess("Identity profile updated!");
                document.getElementById('input-current-pass').value = '';
                document.getElementById('input-new-pass').value = '';
                document.getElementById('input-confirm-pass').value = '';
                if(window.updateSidebarProfile) window.updateSidebarProfile(currentUser);
            } else {
                const err = await res.json();
                showError(err.detail || "Verification failed.");
            }
        } catch(e) {
            showError("Network synchronization failed.");
        }
    };

    document.getElementById('image-upload').onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (re) => {
                document.getElementById('preview-avatar').innerHTML = `<img src="${re.target.result}" class="w-full h-full object-cover rounded-[32px]">`;
            };
            reader.readAsDataURL(file);
        }
    };

    document.addEventListener('DOMContentLoaded', init);
</script>
<style>
    .active-nav { color: white !important; }
    .wizard-step.active { display: block !important; }
    .nav-item.active-nav i { color: var(--primary); }
</style>
</body>
</html>
