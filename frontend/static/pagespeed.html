<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageSpeed - MoniFy-Ping</title>
  <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/custom.css">
  <link rel="stylesheet" href="/static/css/dashboard_premium.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] },
          colors: {
            bg: '#070b14', border: 'rgba(255,255,255,0.05)', primary: '#3b82f6'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg text-gray-300">

<div class="app-shell flex h-screen overflow-hidden">
  
  <!-- Sidebar Inject -->
  <div id="sidebar-container" class="flex-shrink-0"></div>

  <!-- Main Area -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
    
    <!-- Top Navbar -->
    <header class="top-header flex items-center justify-between z-10">
      <div class="flex items-center gap-4">
        <h1 class="header-title font-bold text-white text-2xl">PageSpeed</h1>
        <span id="admin-badge" class="badge-admin py-1 px-3 rounded-full text-[10px] font-bold tracking-widest uppercase">SUPER ADMIN</span>
      </div>
      <div class="flex items-center gap-4">
        <button id="theme-toggle" class="theme-btn w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/10 transition-all border border-white/5" title="Toggle theme">
          <i id="theme-toggle-dark-icon" data-lucide="moon" class="w-4 h-4"></i>
          <i id="theme-toggle-light-icon" data-lucide="sun" class="w-4 h-4" style="color:#eab308;display:none;"></i>
        </button>
        <button onclick="loadAllMonitors()" class="btn-glass flex items-center gap-2 font-semibold">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh
        </button>
      </div>
    </header>

    <!-- Content Area Scrollable -->
    <div class="flex-1 overflow-y-auto p-8 relative">
      
      <!-- Ambient Lights -->
      <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-cyan-600/5 blur-[120px] rounded-full -translate-y-1/2 translate-x-1/2 -z-10"></div>
      
      <div class="max-w-[1200px] mx-auto">
        <div class="space-y-8">
          
          <!-- Unified Search/Analyzer Bar -->
          <div class="premium-panel p-6">
              <div class="flex items-center gap-4">
                  <div class="w-12 h-12 bg-primary/10 rounded-2xl flex items-center justify-center text-primary flex-shrink-0 shadow-lg shadow-primary/10">
                      <i data-lucide="zap" class="w-6 h-6"></i>
                  </div>
                  <div class="flex-1 min-w-[300px] relative">
                      <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                      <input type="text" id="site-tester" placeholder="Search monitors or analyze custom URL (e.g. google.com)" class="w-full bg-white/5 border border-white/5 rounded-xl py-4 pl-12 pr-4 text-sm text-white focus:border-primary outline-none transition-all placeholder:text-gray-600">
                  </div>
                  <button class="btn-primary !h-[50px] px-8 flex items-center gap-2 text-white font-bold" id="btn-check" onclick="checkWebsite()">
                      Run Analysis <i data-lucide="arrow-right" class="w-4 h-4"></i>
                  </button>
              </div>
          </div>

          <!-- Main Table List -->
          <div class="premium-panel overflow-hidden min-h-[500px]">
                <div class="p-6 border-b border-white/5 flex items-center justify-between">
                    <h3 class="text-sm font-bold text-white uppercase tracking-widest">Performance Insights</h3>
                    <span id="results-count" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest tracking-tighter"></span>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left" id="ps-table">
                        <thead class="bg-white/[0.02] text-[10px] font-bold text-gray-500 uppercase tracking-widest">
                            <tr>
                                <th class="px-8 py-4 w-24">Grade</th>
                                <th class="px-8 py-4">Endpoint</th>
                                <th class="px-8 py-4 text-center">UX Status</th>
                                <th class="px-8 py-4 text-center">Load Time</th>
                                <th class="px-8 py-4 text-right">Last Verified</th>
                            </tr>
                        </thead>
                        <tbody id="ps-tbody" class="divide-y divide-white/5">
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>

                <div id="ps-loader" class="p-20 text-center flex-col items-center justify-center hidden">
                    <div class="animate-spin inline-block mb-4"><i data-lucide="loader" class="text-primary w-8 h-8"></i></div>
                    <p class="text-gray-500 font-medium">Measuring core vitals...</p>
                </div>

                <div id="ps-empty" class="p-20 text-center flex flex-col items-center justify-center">
                    <div class="w-16 h-16 bg-white/5 rounded-2xl flex items-center justify-center mb-4">
                         <i data-lucide="gauge" class="text-gray-600 w-8 h-8"></i>
                    </div>
                    <h3 class="text-white font-bold">Analysis Engine Ready</h3>
                    <p class="text-gray-500 text-sm max-w-xs">Scan any URL or search through your monitored services to see real-world performance scores.</p>
                </div>
          </div>

        </div>
      </div>
    </div>

  </main>
</div>

<script src="/static/js/config.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/app.js?v=3"></script>
<script src="/static/js/toast.js"></script>
<script>
(function() {
  const API_URL = window.location.origin;
  const token = localStorage.getItem('token');
  let monitors = [];

  async function loadAllMonitors() {
    setLoading(true);
    try {
      const res = await fetch(`${API_URL}/api/pagespeed/list`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      monitors = await res.json();
      renderTable(monitors);
    } catch (err) {
      console.error('Failed to load PageSpeed list:', err);
      showError("Connection failed. Service unavailable.");
    } finally {
      setLoading(false);
    }
  }

  window.checkWebsite = async function() {
    const input = document.getElementById('site-tester');
    const url = input.value.trim();
    if (!url) return;
    setLoading(true);
    const btn = document.getElementById('btn-check');
    btn.disabled = true;
    try {
      const res = await fetch(`${API_URL}/api/pagespeed/?url=${encodeURIComponent(url)}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) throw new Error("API Failed");
      const result = await res.json();
      const existingIdx = monitors.findIndex(m => m.website === result.website);
      if (existingIdx !== -1) monitors[existingIdx] = result;
      else monitors.unshift(result);
      renderTable(monitors);
    } catch (err) {
      showError("Unable to analyze URL. Please check if the site is reachable.");
    } finally {
      setLoading(false);
      btn.disabled = false;
    }
  }

  function renderTable(data) {
    const tbody = document.getElementById('ps-tbody');
    const empty = document.getElementById('ps-empty');
    if (!data || data.length === 0) {
      tbody.innerHTML = '';
      empty.classList.remove('hidden');
      document.getElementById('results-count').innerText = '';
      return;
    }
    empty.classList.add('hidden');
    document.getElementById('results-count').innerText = `${data.length} endpoints analyzed`;

    tbody.innerHTML = data.map(item => {
      let scoreLabel = item.score !== null ? item.score : '--';
      let scoreColor = 'text-gray-500 border-gray-500/20';
      if (item.score !== null) {
        if (item.score >= 90) scoreColor = 'text-green-500 border-green-500/20 bg-green-500/5';
        else if (item.score >= 50) scoreColor = 'text-yellow-500 border-yellow-500/20 bg-yellow-500/5';
        else scoreColor = 'text-red-500 border-red-500/20 bg-red-500/5';
      }
      let statusLabel = item.status || 'PENDING';
      let statusDot = 'bg-gray-500';
      if (statusLabel === 'FAST') statusDot = 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]';
      else if (statusLabel === 'AVERAGE') statusDot = 'bg-yellow-500';
      else if (statusLabel === 'SLOW') statusDot = 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]';

      const website = item.website || item.url || item.monitor_name;
      const loadTime = item.load_time > 0 ? `${Math.round(item.load_time)}ms` : '--';
      const timeStr = formatDateRel(item.last_checked || item.checked_at);

      return `
        <tr class="hover:bg-white/[0.01] transition-colors group">
          <td class="px-8 py-5">
             <div class="w-12 h-12 rounded-2xl border flex items-center justify-center font-black text-lg ${scoreColor}">
                ${scoreLabel}
             </div>
          </td>
          <td class="px-8 py-5">
            <div class="text-sm font-bold text-white group-hover:text-primary transition-colors">${website}</div>
            <div class="text-[10px] text-gray-600 font-bold uppercase tracking-widest">${item.monitor_name || 'Individual Scan'}</div>
          </td>
          <td class="px-8 py-5 text-center">
             <div class="inline-flex items-center gap-2 bg-white/5 px-4 py-1.5 rounded-full border border-white/5">
                <span class="w-1.5 h-1.5 rounded-full ${statusDot}"></span>
                <span class="text-[10px] font-bold text-white tracking-widest uppercase">${statusLabel}</span>
             </div>
          </td>
          <td class="px-8 py-5 text-center font-bold text-white text-sm">
             ${loadTime}
          </td>
          <td class="px-8 py-5 text-right text-xs text-gray-500 font-medium">
             ${timeStr}
          </td>
        </tr>
      `;
    }).join('');
    lucide.createIcons();
  }

  function formatDateRel(iso) {
    if (!iso) return 'Never';
    const date = new Date(iso);
    const diff = Math.floor((new Date() - date) / 1000);
    if (diff < 60) return 'Just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return date.toLocaleDateString();
  }

  function setLoading(loading) {
    document.getElementById('ps-loader').classList.toggle('hidden', !loading);
    if (loading) document.getElementById('ps-empty').classList.add('hidden');
  }

  function showError(msg) {
    const tbody = document.getElementById('ps-tbody');
    tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center"><p class="text-red-500 font-bold">${msg}</p></td></tr>`;
  }

  document.getElementById('site-tester').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') checkWebsite();
  });

  document.getElementById('site-tester').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = monitors.filter(m => (m.website && m.website.toLowerCase().includes(term)) || (m.url && m.url.toLowerCase().includes(term)));
    renderTable(filtered);
  });

  document.addEventListener('DOMContentLoaded', loadAllMonitors);
})();
</script>
</body>
</html>
