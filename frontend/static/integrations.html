<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integrations - MoniFy-Ping</title>
  <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/custom.css">
  <link rel="stylesheet" href="/static/css/dashboard_premium.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] },
          colors: {
            bg: '#070b14', border: 'rgba(255,255,255,0.05)', primary: '#3b82f6'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg text-gray-300">

<div class="app-shell flex h-screen overflow-hidden">
  
  <!-- Sidebar Inject -->
  <div id="sidebar-container" class="flex-shrink-0"></div>

  <!-- Main Area -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
    
    <!-- Top Navbar -->
    <header class="top-header flex items-center justify-between z-10">
      <div class="flex items-center gap-4">
        <h1 class="header-title font-bold text-white text-2xl">Integrations</h1>
        <span id="admin-badge" class="badge-admin py-1 px-3 rounded-full text-[10px] font-bold tracking-widest uppercase">SUPER ADMIN</span>
      </div>
      <div class="flex items-center gap-4">
        <button id="theme-toggle" class="theme-btn w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/10 transition-all border border-white/5" title="Toggle theme">
          <i id="theme-toggle-dark-icon" data-lucide="moon" class="w-4 h-4"></i>
          <i id="theme-toggle-light-icon" data-lucide="sun" class="w-4 h-4" style="color:#eab308;display:none;"></i>
        </button>
      </div>
    </header>

    <!-- Content Area Scrollable -->
    <div class="flex-1 overflow-y-auto p-8 relative">
      <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-purple-600/5 blur-[120px] rounded-full -translate-y-1/2 translate-x-1/2 -z-10"></div>
      
      <div class="max-w-[1200px] mx-auto">
        <div class="space-y-12">
          
          <div class="premium-panel p-8">
              <h2 class="text-xl font-bold text-white mb-2">Connected Platforms</h2>
              <p class="text-gray-500 font-medium">Link your favorite communication tools to receive real-time incident reports and alerts.</p>
          </div>

          <div id="integrations-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
              <!-- Rendered by JS -->
          </div>

        </div>
      </div>
    </div>

  </main>
</div>

<!-- Modal Container -->
<div class="modal items-start py-20 px-4" id="config-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; overflow-y:auto; backdrop-filter:blur(10px);">
    <div class="premium-panel p-8 w-full max-w-[550px] mx-auto animate-slide-up">
        <div class="flex justify-between items-center mb-10 pb-4 border-b border-white/5">
            <div class="flex items-center gap-4">
                <div id="modal-icon-container" class="w-12 h-12 rounded-2xl flex items-center justify-center bg-white/5">
                    <i id="modal-icon" class="w-6 h-6"></i>
                </div>
                <div>
                   <h2 class="text-xl font-bold text-white" id="modal-title">Configure</h2>
                   <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Integration Settings</p>
                </div>
            </div>
            <button onclick="closeModal()" class="w-8 h-8 bg-white/5 rounded-lg flex items-center justify-center hover:bg-white/10 transition-all text-gray-500 hover:text-white">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>

        <form id="config-form" class="space-y-8">
            <div id="form-body" class="space-y-6"></div>
            
            <div class="p-6 bg-white/5 rounded-2xl border border-white/5 flex items-center justify-between">
                <div>
                   <span class="text-sm font-bold text-white block">Status</span>
                   <span class="text-[10px] text-gray-500 uppercase font-black">Toggle connectivity</span>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="int-enabled" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                </label>
            </div>

            <div class="flex items-center gap-4 pt-4">
                <button type="button" class="btn-glass flex-1 !text-primary hover:!bg-primary/10" onclick="testIntegration()" id="test-btn">
                   Test Connection
                </button>
                <button type="submit" class="btn-primary flex-1 text-white font-bold" id="save-btn">
                   Apply Settings
                </button>
            </div>
        </form>
    </div>
</div>

<script src="/static/js/config.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/app.js?v=3"></script>
<script src="/static/js/toast.js"></script>
<script>
lucide.createIcons();

const API_URL = window.location.origin;
const token = localStorage.getItem('token');
let integrationsData = [];
let currentProvider = null;

const PROVIDERS = [
    { id: 'email', name: 'Email (SMTP)', icon: 'mail', color: '#3b82f6', desc: 'Enterprise-grade SMTP delivery for critical incident reports.' },
    { id: 'slack', name: 'Slack', icon: 'message-square', color: '#22c55e', desc: 'Push real-time payloads to any Slack channel via webhooks.' },
    { id: 'discord', name: 'Discord', icon: 'message-circle', color: '#818cf8', desc: 'Alert your team instantly within high-availability channels.' },
    { id: 'webhook', name: 'Webhooks', icon: 'link', color: '#f59e0b', desc: 'Trigger custom REST endpoints with JSON payloads for workflows.' },
    { id: 'github', name: 'GitHub', icon: 'github', color: '#ffffff', desc: 'Automate incident tracking by creating repository issues.' }
];

async function loadIntegrations() {
    try {
        const res = await fetch('/api/integrations', { headers: { 'Authorization': `Bearer ${token}` } });
        if(res.ok) {
            integrationsData = await res.json();
            renderList();
        } else if (res.status === 401) {
            window.location.href = '/';
        }
    } catch(e) { console.error(e); }
}

function renderList() {
    const list = document.getElementById('integrations-list');
    
    list.innerHTML = PROVIDERS.map(prov => {
        const existing = integrationsData.find(i => i.provider === prov.id);
        const isConfigured = !!existing;
        const isEnabled = existing ? existing.is_enabled : false;
        
        let statusBadge = `<span class="text-[9px] font-black text-gray-500 bg-white/5 border border-white/10 px-3 py-1 rounded-full uppercase tracking-widest">INACTIVE</span>`;
        if (isConfigured) {
            if (isEnabled) statusBadge = `<span class="text-[9px] font-black text-green-500 bg-green-500/10 border border-green-500/20 px-3 py-1 rounded-full uppercase tracking-widest shadow-[0_0_10px_rgba(34,197,94,0.2)]">CONNECTED</span>`;
            else statusBadge = `<span class="text-[9px] font-black text-red-500 bg-red-500/10 border border-red-500/20 px-3 py-1 rounded-full uppercase tracking-widest">DISABLED</span>`;
        }

        return `
        <div class="premium-panel p-8 flex flex-col justify-between group hover:border-primary/20 transition-all cursor-default relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-start mb-8">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center shadow-2xl transition-transform group-hover:scale-110 duration-500" style="background:${prov.color}15; border: 1px solid ${prov.color}25">
                        <i data-lucide="${prov.icon}" style="color:${prov.color}; width:28px; height:28px;"></i>
                    </div>
                    ${statusBadge}
                </div>
                <h3 class="text-white font-extrabold text-xl mb-3 tracking-tight">${prov.name}</h3>
                <p class="text-gray-500 font-medium text-xs leading-relaxed mb-10">${prov.desc}</p>
            </div>
            
            <button class="btn-glass w-full group-hover:!bg-white/5 font-bold py-3 uppercase text-[10px] tracking-widest relative z-10" onclick="openConfig('${prov.id}')">
                ${isConfigured ? 'Configure Provider' : 'Setup Integration'}
            </button>
            <div class="absolute bottom-0 right-0 w-32 h-32 blur-[60px] opacity-10 rounded-full -mr-16 -mb-16 -z-0" style="background:${prov.color}"></div>
        </div>
        `;
    }).join('');
    
    lucide.createIcons();
}

function openConfig(providerId) {
    currentProvider = providerId;
    const providerDef = PROVIDERS.find(p => p.id === providerId);
    const existing = integrationsData.find(i => i.provider === providerId);
    const config = existing ? existing.config : {};
    
    document.getElementById('modal-title').innerText = providerDef.name;
    document.getElementById('modal-icon').setAttribute('data-lucide', providerDef.icon);
    document.getElementById('modal-icon').style.color = providerDef.color;
    document.getElementById('modal-icon-container').style.background = providerDef.color + '15';
    document.getElementById('int-enabled').checked = existing ? existing.is_enabled : true;

    const body = document.getElementById('form-body');
    let formHtml = '';

    const inputStyle = "w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-sm text-white focus:border-primary outline-none transition-all placeholder:text-gray-700";
    const labelStyle = "block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1";

    if(providerId === 'email') {
        formHtml = `
            <div><label class="${labelStyle}">SMTP Host</label><input type="text" class="${inputStyle}" id="cfg-host" value="${config.smtp_host||''}" required placeholder="e.g. smtp.gmail.com"></div>
            <div><label class="${labelStyle}">Port</label><input type="number" class="${inputStyle}" id="cfg-port" value="${config.smtp_port||587}" required></div>
            <div><label class="${labelStyle}">Auth User</label><input type="email" class="${inputStyle}" id="cfg-email" value="${config.email||''}" required placeholder="email@example.com"></div>
            <div><label class="${labelStyle}">Password</label><input type="password" class="${inputStyle}" id="cfg-pass" value="${config.password||''}" required></div>
            <div><label class="${labelStyle}">Sender Name</label><input type="text" class="${inputStyle}" id="cfg-from" value="${config.from_name||'MoniFy Alerts'}"></div>
        `;
    } 
    else if(providerId === 'slack' || providerId === 'discord') {
        formHtml = `
            <div>
                <label class="${labelStyle}">Destination Webhook</label>
                <input type="url" class="${inputStyle}" id="cfg-webhook" value="${config.webhook_url||''}" required placeholder="https://hooks.platform.com/...">
            </div>
        `;
    }
    else if(providerId === 'webhook') {
        formHtml = `
            <div><label class="${labelStyle}">Target URL</label><input type="url" class="${inputStyle}" id="cfg-ep" value="${config.endpoint_url||''}" required></div>
            <div><label class="${labelStyle}">Request Method</label><select class="${inputStyle}" id="cfg-method"><option value="POST">POST</option><option value="GET">GET</option></select></div>
            <div><label class="${labelStyle}">Headers (JSON)</label><textarea class="${inputStyle}" id="cfg-headers" rows="2">${config.headers||'{}'}</textarea></div>
            <div><label class="${labelStyle}">Payload Template</label><textarea class="${inputStyle}" id="cfg-body" rows="3">${config.body_template||'{"text": "Monitor {{site_name}} status: {{status}}"}'}</textarea></div>
        `;
    }
    else if(providerId === 'github') {
        formHtml = `
            <div><label class="${labelStyle}">Access Token</label><input type="password" class="${inputStyle}" id="cfg-ghtoken" value="${config.github_token||''}" required></div>
            <div><label class="${labelStyle}">Repository Path</label><input type="text" class="${inputStyle}" id="cfg-repo" value="${config.repository||''}" required placeholder="owner/repository"></div>
        `;
    }

    body.innerHTML = formHtml;
    document.getElementById('test-btn').style.display = existing ? 'block' : 'none';
    lucide.createIcons();
    document.getElementById('config-modal').style.display = 'block';
}

function closeModal() {
    document.getElementById('config-modal').style.display = 'none';
}

document.getElementById('config-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('save-btn');
    const oldText = btn.innerText;
    btn.innerText = 'Saving...'; btn.disabled = true;

    let config = {};
    if(currentProvider === 'email') {
        config = {
            smtp_host: document.getElementById('cfg-host').value,
            smtp_port: parseInt(document.getElementById('cfg-port').value),
            email: document.getElementById('cfg-email').value,
            password: document.getElementById('cfg-pass').value,
            from_name: document.getElementById('cfg-from').value
        };
    } else if(currentProvider === 'slack' || currentProvider === 'discord') {
        config = { webhook_url: document.getElementById('cfg-webhook').value };
    } else if(currentProvider === 'webhook') {
        config = { endpoint_url: document.getElementById('cfg-ep').value, method: document.getElementById('cfg-method').value, headers: document.getElementById('cfg-headers').value, body_template: document.getElementById('cfg-body').value };
    } else if(currentProvider === 'github') {
        config = { github_token: document.getElementById('cfg-ghtoken').value, repository: document.getElementById('cfg-repo').value };
    }

    const payload = { provider: currentProvider, config: config, is_enabled: document.getElementById('int-enabled').checked };

    try {
        const res = await fetch('/api/integrations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(payload)
        });
        if(!res.ok) throw new Error("Verification failed.");
        closeModal();
        await loadIntegrations();
        showToast("Configuration saved successfully!");
    } catch(err) {
        showToast("Error updating settings.", "error");
    } finally {
        btn.innerText = oldText; btn.disabled = false;
    }
});

async function testIntegration() {
    const btn = document.getElementById('test-btn');
    btn.disabled = true;
    try {
        const res = await fetch(`/api/integrations/${currentProvider}/test`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
        if(!res.ok) throw new Error("Test failed.");
        showToast("Test payload transmitted!");
    } catch(err) {
        showToast("Test firing failed.", "error");
    } finally {
        btn.disabled = false;
    }
}

document.addEventListener('DOMContentLoaded', loadIntegrations);
</script>
</body>
</html>
