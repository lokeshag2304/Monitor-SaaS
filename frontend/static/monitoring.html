<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring - MoniFy-Ping</title>
  <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/custom.css">
  <link rel="stylesheet" href="/static/css/dashboard_premium.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] },
          colors: {
            bg: '#070b14', border: 'rgba(255,255,255,0.05)', primary: '#3b82f6'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg text-gray-300">

<div class="app-shell flex h-screen overflow-hidden">
  
  <!-- Sidebar Inject -->
  <div id="sidebar-container" class="flex-shrink-0"></div>

  <!-- Main Area -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
    
    <!-- Top Navbar -->
    <header class="top-header flex items-center justify-between z-10">
      <div class="flex items-center gap-4">
        <h1 class="header-title font-bold text-white text-2xl">Monitoring</h1>
        <span id="admin-badge" class="badge-admin py-1 px-3 rounded-full text-[10px] font-bold tracking-widest uppercase">SUPER ADMIN</span>
      </div>
      <div class="flex items-center gap-4">
        <button id="theme-toggle" class="theme-btn w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/10 transition-all border border-white/5" title="Toggle theme">
          <i id="theme-toggle-dark-icon" data-lucide="moon" class="w-4 h-4"></i>
          <i id="theme-toggle-light-icon" data-lucide="sun" class="w-4 h-4" style="color:#eab308;display:none;"></i>
        </button>
        <button onclick="toggleBulkModal()" class="btn-glass flex items-center gap-2 font-semibold">
          <i data-lucide="upload" class="w-4 h-4"></i> Bulk Import
        </button>
        <button onclick="toggleModal('add-modal')" class="btn-primary flex items-center gap-2 text-white">
          <i data-lucide="plus" class="w-4 h-4"></i> Create New
        </button>
      </div>
    </header>

    <!-- Content Area Scrollable -->
    <div class="flex-1 overflow-y-auto p-8 relative">
      
      <!-- Ambient Lights -->
      <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-blue-600/5 blur-[120px] rounded-full -translate-y-1/2 translate-x-1/2 -z-10"></div>
      
      <div class="max-w-[1400px] mx-auto">
        <div class="space-y-8">
          
          <!-- Greeting Section -->
          <div class="premium-panel p-8 md:p-10">
            <div class="flex items-center gap-4 mb-4">
               <div class="w-12 h-12 rounded-2xl bg-primary/10 flex items-center justify-center">
                  <i data-lucide="activity" class="text-primary w-6 h-6"></i>
               </div>
               <div>
                  <h1 class="text-2xl font-bold text-white tracking-tight">Hey there, <span class="text-primary" id="greeting-name-display">User</span> 🍕</h1>
                  <p class="text-gray-500 font-medium">Here's a comprehensive overview of your uptime monitors.</p>
               </div>
            </div>
          </div>

          <!-- Filters Section -->
          <div class="premium-panel p-6 flex flex-wrap items-center gap-4">
            <div class="relative flex-1 min-w-[300px]">
              <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
              <input type="text" id="monitor-search" placeholder="Search monitors..." oninput="filterMonitorCards()" class="w-full bg-white/5 border border-white/5 rounded-xl py-3 pl-11 pr-4 text-sm text-white focus:border-primary outline-none transition-all placeholder:text-gray-600" autocomplete="off">
            </div>
            <select class="bg-white/5 border border-white/5 text-gray-400 rounded-xl px-4 py-3 text-sm focus:border-primary outline-none cursor-pointer" id="status-filter" onchange="filterMonitorCards()">
              <option value="all">All Status</option>
              <option value="up">UP Only</option>
              <option value="down">DOWN Only</option>
              <option value="paused">Paused</option>
            </select>
            <select class="bg-white/5 border border-white/5 text-gray-400 rounded-xl px-4 py-3 text-sm focus:border-primary outline-none cursor-pointer" id="sort-filter" onchange="filterMonitorCards()">
              <option value="default">Sort: Default</option>
              <option value="response">Response Time</option>
              <option value="down">Down First</option>
              <option value="name">Name A-Z</option>
            </select>
            <div class="flex items-center gap-3 bg-white/5 border border-white/5 px-4 py-3 rounded-xl ml-auto">
                <span class="status-dot-live"></span>
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest" id="monitor-count">0 monitors</span>
            </div>
          </div>

          <!-- Monitor List -->
          <div class="premium-panel p-6 overflow-x-auto">
            <div class="monitor-list-header mb-4 px-4 opacity-50">
                <!-- Data injected by app.js / dashboard.js -->
            </div>
            <div class="space-y-3" id="monitor-cards-container">
                <div class="flex flex-col items-center justify-center p-20 text-center space-y-4">
                    <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center animate-pulse">
                        <i data-lucide="rocket" class="text-gray-600 w-8 h-8"></i>
                    </div>
                    <p class="text-gray-500 font-medium">Initializing Monitoring Engine...</p>
                </div>
            </div>
          </div>

        </div>
      </div>
    </div>

  </main>
</div>

<!-- Modal Placeholders -->
<div id="add-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">Add New Monitor</div>
    <div class="modal-sub">Track uptime and response time for any URL.</div>
    <form id="add-form">
      <div class="form-group"><label class="form-label" for="site-name">Display Name</label><input type="text" id="site-name" class="form-input" placeholder="Prod Server" autocomplete="off"></div>
      <div class="form-group"><label class="form-label" for="site-url">URL</label><input type="text" id="site-url" class="form-input" placeholder="google.com" autocomplete="off"></div>
      <div class="form-group"><label class="form-label" for="site-interval">Check Interval (mins)</label><input type="number" id="site-interval" class="form-input" value="5" min="1"></div>
      <div class="modal-actions">
        <button type="button" onclick="toggleModal('add-modal')" class="btn-cancel">Cancel</button>
        <button type="submit" class="btn-submit">Create Monitor</button>
      </div>
    </form>
  </div>
</div>

<script src="/static/js/config.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/app.js?v=3"></script>
<script src="/static/js/dashboard.js"></script>
<script src="/static/js/toast.js"></script>
<script>lucide.createIcons();</script>

</body>
</html>
